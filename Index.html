<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden Fawn Globe</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;}
  canvas{display:block;}

  #loading{
    position:fixed;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;color:#E5AA70;
    font-family:system-ui,sans-serif;font-size:14px;letter-spacing:2px;gap:16px;z-index:10;
  }
  #loading-bar-wrap{width:200px;height:2px;background:rgba(229,170,112,0.2);border-radius:2px;}
  #loading-bar{height:2px;width:0%;background:#E5AA70;border-radius:2px;transition:width 0.3s;}

  #pins{position:fixed;inset:0;pointer-events:none;z-index:5;}

  .pin-wrap{
    position:absolute;
    pointer-events:auto;
    transform:translate(-50%,-100%);
    display:flex;flex-direction:column;align-items:center;
    will-change:transform;
  }

  .capsule{
    display:flex;align-items:center;gap:7px;
    padding:5px 8px 5px 8px;
    background:rgba(8,6,2,0.88);
    border:1px solid rgba(229,170,112,0.5);
    border-radius:100px;
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    cursor:default;
    white-space:nowrap;
    max-width:30px;
    overflow:hidden;
    transition:
      max-width  0.42s cubic-bezier(0.34,1.56,0.64,1),
      padding    0.42s cubic-bezier(0.34,1.56,0.64,1),
      border-color 0.2s,
      box-shadow   0.2s;
  }
  .pin-wrap:hover .capsule{
    max-width:200px;
    padding:5px 14px 5px 9px;
    border-color:rgba(229,170,112,0.95);
    box-shadow:0 0 22px rgba(229,170,112,0.28), inset 0 0 12px rgba(229,170,112,0.06);
  }

  .capsule-label{
    font-family:'SF Pro Display',system-ui,sans-serif;
    font-size:11px;
    font-weight:700;
    letter-spacing:0.14em;
    color:#E5AA70;
    opacity:0;
    transition:opacity 0.18s 0.12s;
    user-select:none;
  }
  .pin-wrap:hover .capsule-label{opacity:1;}

  /* icon wrapper */
  .loc-icon{
    width:16px;height:18px;
    flex-shrink:0;
    position:relative;
    display:flex;align-items:flex-end;justify-content:center;
  }
  .loc-icon svg{width:14px;height:18px;overflow:visible;display:block;}

  /* pin head group — animated separately */
  .pin-head{transform-origin:50% 90%;}

  .pin-wrap:hover .pin-head{
    animation:pinBounce 0.6s cubic-bezier(0.36,0.07,0.19,0.97) both;
  }
  @keyframes pinBounce{
    0%  {transform:scale(1,1)     translateY(0);}
    20% {transform:scale(0.78,1.32) translateY(-6px);}
    40% {transform:scale(1.18,0.78) translateY(3px);}
    58% {transform:scale(0.9,1.12)  translateY(-2px);}
    74% {transform:scale(1.06,0.94) translateY(1px);}
    88% {transform:scale(0.98,1.02) translateY(0);}
    100%{transform:scale(1,1)     translateY(0);}
  }

  /* Ripple ring from pin tip */
  .pin-ring{
    position:absolute;
    bottom:-1px;left:50%;
    width:5px;height:5px;
    border-radius:50%;
    transform:translate(-50%,50%) scale(0);
    background:rgba(229,170,112,0);
    pointer-events:none;
  }
  .pin-wrap:hover .pin-ring{
    animation:ringPulse 0.65s ease-out 0.04s both;
  }
  @keyframes ringPulse{
    0%  {transform:translate(-50%,50%) scale(0);  background:rgba(229,170,112,0.75);}
    55% {transform:translate(-50%,50%) scale(4);  background:rgba(229,170,112,0.18);}
    100%{transform:translate(-50%,50%) scale(5.5);background:rgba(229,170,112,0);}
  }

  /* Connecting line */
  .pin-line{
    width:1px;height:12px;
    background:linear-gradient(to bottom,rgba(229,170,112,0.75),rgba(229,170,112,0));
    flex-shrink:0;
  }

  /* Whole wrapper bounces up slightly on hover */
  .pin-wrap:hover{
    animation:wrapLift 0.42s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes wrapLift{
    0%  {transform:translate(-50%,-100%);}
    35% {transform:translate(-50%,calc(-100% - 5px));}
    65% {transform:translate(-50%,calc(-100% + 2px));}
    82% {transform:translate(-50%,calc(-100% - 1px));}
    100%{transform:translate(-50%,-100%);}
  }

  /* back-face hidden */
  .pin-wrap.behind{
    opacity:0 !important;
    pointer-events:none;
    transition:opacity 0.25s;
  }
  .pin-wrap{transition:opacity 0.25s;}
</style>
</head>
<body>

<div id="loading">
  <span id="loading-text">LOADING WORLD MAP</span>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
</div>

<div id="pins"></div>
<!-- SVG overlay for inter-capsule connection lines + signal glows -->
<svg id="lines-svg" style="position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:4;" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Soft outer halo — very wide, very faint -->
    <filter id="glow-halo" x="-400%" y="-400%" width="900%" height="900%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="halo"/>
      <feColorMatrix in="halo" type="matrix"
        values="1 0 0 0 0
                0 0.67 0 0 0
                0 0 0.44 0 0
                0 0 0 0.18 0" result="tintedHalo"/>
      <feMerge><feMergeNode in="tintedHalo"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Tight core glow for the dot itself -->
    <filter id="glow-core" x="-300%" y="-300%" width="700%" height="700%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.6" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g id="lines-group"></g>
  <g id="signals-group"></g>
</svg>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }     from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const loadingEl  = document.getElementById('loading');
const loadingBar = document.getElementById('loading-bar');
const loadingTxt = document.getElementById('loading-text');
function setProgress(p, txt){
  loadingBar.style.width = (p*100)+'%';
  if(txt) loadingTxt.textContent = txt;
}

// ── Sprite texture ────────────────────────────────────────────────────────────
function makeSprite(){
  const c = document.createElement('canvas'); c.width = 64; c.height = 64;
  const x = c.getContext('2d');
  const g = x.createRadialGradient(32,32,0,32,32,32);
  g.addColorStop(0,   'rgba(255,255,255,1)');
  g.addColorStop(0.25,'rgba(255,255,255,0.35)');
  g.addColorStop(0.6, 'rgba(255,255,255,0.04)');
  g.addColorStop(1,   'rgba(0,0,0,0)');
  x.fillStyle = g; x.fillRect(0,0,64,64);
  return new THREE.CanvasTexture(c);
}

// ── Grid background ───────────────────────────────────────────────────────────
function makeGridTex(){
  const s = 1024, c = document.createElement('canvas');
  c.width = s; c.height = s;
  const x = c.getContext('2d');
  x.fillStyle = '#000'; x.fillRect(0,0,s,s);
  x.strokeStyle = '#E5AA70'; x.lineWidth = 1.5; x.globalAlpha = 0.12;
  const step = s/20;
  for(let i = 0; i <= s; i += step){
    x.beginPath(); x.moveTo(i,0); x.lineTo(i,s); x.stroke();
    x.beginPath(); x.moveTo(0,i); x.lineTo(s,i); x.stroke();
  }
  const t = new THREE.CanvasTexture(c);
  t.wrapS = THREE.RepeatWrapping; t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(12,12);
  return t;
}

// ── Land mask ─────────────────────────────────────────────────────────────────
const GW = 4096, GH = 2048;
let landImageData = null;

function buildLandCanvas(geojson){
  const c = document.createElement('canvas');
  c.width = GW; c.height = GH;
  const ctx = c.getContext('2d', { willReadFrequently: true });
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,GW,GH);
  ctx.fillStyle = '#fff';
  function project(lon, lat){ return [(lon+180)/360*GW, (90-lat)/180*GH]; }
  for(const feature of geojson.features){
    const g = feature.geometry;
    const polys = g.type==='Polygon' ? [g.coordinates]
                : g.type==='MultiPolygon' ? g.coordinates : [];
    for(const poly of polys){
      ctx.beginPath();
      for(const ring of poly){
        const [x0,y0] = project(ring[0][0], ring[0][1]);
        ctx.moveTo(x0, y0);
        for(let i = 1; i < ring.length; i++){
          const [x,y] = project(ring[i][0], ring[i][1]);
          ctx.lineTo(x, y);
        }
        ctx.closePath();
      }
      ctx.fill('evenodd');
    }
  }
  landImageData = ctx.getImageData(0,0,GW,GH).data;
}

function isLand(lat, lon){
  lon = ((lon+180)%360+360)%360-180;
  const gx = Math.min(GW-1, Math.max(0, Math.round((lon+180)/360*GW)));
  const gy = Math.min(GH-1, Math.max(0, Math.round((90-lat) /180*GH)));
  return landImageData[(gy*GW+gx)*4] > 128;
}

// ── Three.js scene ────────────────────────────────────────────────────────────
const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 0, 14); camera.lookAt(0,0,0);
const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.9, 0.4, 0.1);
bloom.strength = 0.55; bloom.radius = 0.3; bloom.threshold = 0.25;
composer.addPass(bloom);

const wallMat = new THREE.MeshBasicMaterial({
  map: makeGridTex(), transparent: true, opacity: 0.16,
  blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide
});
const wall = new THREE.Mesh(new THREE.PlaneGeometry(180,180), wallMat);
wall.position.set(0,0,-40); wall.lookAt(camera.position); scene.add(wall);

const globeGroup = new THREE.Group(); scene.add(globeGroup);

// ── Country pin data ──────────────────────────────────────────────────────────
const RADIUS = 4.5;

const COUNTRIES = [
  { name: 'USA',         lat:  38.9,  lon: -77.0  },
  { name: 'UAE',         lat:  24.47, lon:  54.37  },
  { name: 'UK',          lat:  51.5,  lon:  -0.12  },
  { name: 'Switzerland', lat:  46.95, lon:   7.45  },
  { name: 'Pakistan',    lat:  33.72, lon:  73.06  },
];

// lat/lon → local 3D coords in globeGroup
// MUST match Fibonacci sphere convention: lon = atan2(pz, px)
// so 0°lon = +X axis, 90°lon = +Z axis
function latLonTo3D(lat, lon, r){
  const phi   = (90 - lat) * Math.PI / 180;
  const theta = -lon       * Math.PI / 180;  // negated to match point cloud
  return new THREE.Vector3(
    r * Math.sin(phi) * Math.cos(theta),
    r * Math.cos(phi),
    r * Math.sin(phi) * Math.sin(theta)
  );
}

// Build DOM elements
const pinsContainer = document.getElementById('pins');

const pinObjects = COUNTRIES.map(c => {
  const pos3D = latLonTo3D(c.lat, c.lon, RADIUS);

  const wrap = document.createElement('div');
  wrap.className = 'pin-wrap behind'; // hidden until globe ready

  wrap.innerHTML = `
    <div class="capsule">
      <div class="loc-icon">
        <svg viewBox="0 0 14 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <g class="pin-head">
            <path d="M7 0C3.69 0 1 2.69 1 6C1 10.5 7 18 7 18C7 18 13 10.5 13 6C13 2.69 10.31 0 7 0Z"
              fill="rgba(229,170,112,0.15)" stroke="#E5AA70" stroke-width="1.1" stroke-linejoin="round"/>
            <circle cx="7" cy="6" r="2.4" fill="#E5AA70"/>
          </g>
        </svg>
        <div class="pin-ring"></div>
      </div>
      <span class="capsule-label">${c.name}</span>
    </div>
    <div class="pin-line"></div>
  `;

  pinsContainer.appendChild(wrap);

  return { country: c, pos3D, el: wrap };
});

// ── Connection pairs ──────────────────────────────────────────────────────────
const CONNECTIONS = [
  [0,1],[0,2],[0,3],[0,4],
  [1,2],[2,3],[3,4],[1,4]
];

const linesSVG     = document.getElementById('lines-svg');
const linesGroup   = document.getElementById('lines-group');
const signalsGroup = document.getElementById('signals-group');

const connEls = CONNECTIONS.map(([ai, bi], idx) => {
  // Arc path (the static trail line)
  const ln = document.createElementNS('http://www.w3.org/2000/svg','path');
  ln.setAttribute('stroke','rgba(229,170,112,0.13)');
  ln.setAttribute('stroke-width','0.6');
  ln.setAttribute('stroke-linecap','round');
  ln.setAttribute('fill','none');
  linesGroup.appendChild(ln);

  // Outer halo circle (large, very faint)
  const halo = document.createElementNS('http://www.w3.org/2000/svg','circle');
  halo.setAttribute('r','9');
  halo.setAttribute('fill','rgba(229,170,112,0.07)');
  halo.setAttribute('filter','url(#glow-halo)');
  signalsGroup.appendChild(halo);

  // Mid glow circle
  const mid = document.createElementNS('http://www.w3.org/2000/svg','circle');
  mid.setAttribute('r','4');
  mid.setAttribute('fill','rgba(229,170,112,0.22)');
  mid.setAttribute('filter','url(#glow-core)');
  signalsGroup.appendChild(mid);

  // Bright core dot
  const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
  dot.setAttribute('r','1.8');
  dot.setAttribute('fill','rgba(240,200,150,0.92)');
  signalsGroup.appendChild(dot);

  // Landing ring flash
  const flash = document.createElementNS('http://www.w3.org/2000/svg','circle');
  flash.setAttribute('r','4');
  flash.setAttribute('fill','none');
  flash.setAttribute('stroke','rgba(229,170,112,0)');
  flash.setAttribute('stroke-width','1');
  signalsGroup.appendChild(flash);

  const speed = 0.00016 + idx * 0.000022;
  const phase = idx / CONNECTIONS.length;
  return { ln, halo, mid, dot, flash, ai, bi, speed, t: phase, lastT: phase, flashT: 2 };
});

const screenPos = COUNTRIES.map(() => ({ x:0, y:0, vis:false }));

// ── 3D → screen projection ────────────────────────────────────────────────────
const _wp = new THREE.Vector3();

function projectPin(pin){
  // World position
  _wp.copy(pin.pos3D).applyMatrix4(globeGroup.matrixWorld);

  // Facing check: dot of normalised world pos with camera direction
  // Camera is at (0,0,14), globe at origin → camera dir ≈ -Z world
  // A point is visible if its world Z (after globe rotation) > some threshold
  const camDir = camera.position.clone().normalize();
  const dot = _wp.clone().normalize().dot(camDir);

  // NDC projection
  const ndc = _wp.clone().project(camera);
  const sx = ( ndc.x * 0.5 + 0.5) * innerWidth;
  const sy = (-ndc.y * 0.5 + 0.5) * innerHeight;

  return { sx, sy, facing: dot > 0.08 };
}

// ── Main boot ─────────────────────────────────────────────────────────────────
async function boot(){
  setProgress(0.05, 'FETCHING MAP DATA');
  const topo = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/land-50m.json')
                     .then(r => r.json());

  setProgress(0.30, 'DRAWING LAND POLYGONS');
  const land = topojson.feature(topo, topo.objects.land);
  buildLandCanvas(land);

  setProgress(0.65, 'SCATTERING POINTS');

  const COUNT       = 35000;
  const goldenFawn  = new THREE.Color(0xE5AA70);
  const goldenAngle = Math.PI * (3 - Math.sqrt(5));
  const positions   = new Float32Array(COUNT * 3);
  const colors      = new Float32Array(COUNT * 3);
  const baseSizes   = new Float32Array(COUNT);
  const sizes       = new Float32Array(COUNT);

  for(let i = 0; i < COUNT; i++){
    const t     = i / (COUNT - 1);
    const y     = 1 - t * 2;
    const r     = Math.sqrt(Math.max(0, 1 - y*y));
    const theta = goldenAngle * i;
    const px    = Math.cos(theta) * r * RADIUS;
    const py    = y * RADIUS;
    const pz    = Math.sin(theta) * r * RADIUS;
    positions[i*3]   = px;
    positions[i*3+1] = py;
    positions[i*3+2] = pz;

    const lat = Math.asin(Math.max(-1, Math.min(1, py/RADIUS))) * 180 / Math.PI;
    const lon = -Math.atan2(pz, px) * 180 / Math.PI;
    const onLand = isLand(lat, lon);

    const sz = onLand ? 0.068 : 0.008;
    baseSizes[i] = sz; sizes[i] = sz;

    if(onLand){
      colors[i*3]   = goldenFawn.r * (0.95 + Math.random()*0.1);
      colors[i*3+1] = goldenFawn.g * (0.90 + Math.random()*0.1);
      colors[i*3+2] = goldenFawn.b * (0.80 + Math.random()*0.1);
    } else {
      const dim = 0.28 + Math.random()*0.14;
      colors[i*3]   = goldenFawn.r * dim;
      colors[i*3+1] = goldenFawn.g * dim;
      colors[i*3+2] = goldenFawn.b * dim;
    }
  }

  setProgress(0.85, 'BUILDING GLOBE');

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position',    new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('customColor', new THREE.BufferAttribute(colors,    3));
  geo.setAttribute('size',        new THREE.BufferAttribute(sizes,     1));

  const mat = new THREE.ShaderMaterial({
    uniforms: { pointTexture: { value: makeSprite() } },
    vertexShader:`
      attribute float size; attribute vec3 customColor; varying vec3 vColor;
      void main(){
        vColor = customColor;
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = size * (450.0 / -mv.z);
        gl_Position  = projectionMatrix * mv;
      }`,
    fragmentShader:`
      uniform sampler2D pointTexture; varying vec3 vColor;
      void main(){
        vec4 tex = texture2D(pointTexture, gl_PointCoord);
        gl_FragColor = vec4(vColor, 1.0) * tex;
        if(gl_FragColor.a < 0.01) discard;
      }`,
    blending: THREE.AdditiveBlending, depthWrite: false, transparent: true
  });

  const globe = new THREE.Points(geo, mat);
  globeGroup.add(globe);

  const hitMesh = new THREE.Mesh(
    new THREE.SphereGeometry(RADIUS, 32, 32),
    new THREE.MeshBasicMaterial({ visible: false })
  );
  globeGroup.add(hitMesh);

  setProgress(1.0, 'READY');
  await new Promise(r => setTimeout(r, 300));
  loadingEl.style.display = 'none';

  // Reveal pins
  pinObjects.forEach(p => p.el.classList.remove('behind'));

  // ── Interaction ───────────────────────────────────────────────────────────
  let isDragging = false, prevX = 0, prevY = 0, velX = 0, velY = 0;
  const mouse     = new THREE.Vector2(999, 999);
  const raycaster = new THREE.Raycaster();
  const tempV     = new THREE.Vector3();
  const HOVER_R   = 2.2, MAX_SZ = 0.30;

  window.addEventListener('mousedown', e => {
    isDragging = true; prevX = e.clientX; prevY = e.clientY; velX = 0; velY = 0;
  });
  window.addEventListener('mouseup', () => { isDragging = false; });
  window.addEventListener('mousemove', e => {
    if(isDragging){
      velY = (e.clientX - prevX) * 0.004;
      velX = (e.clientY - prevY) * 0.004;
      prevX = e.clientX; prevY = e.clientY;
    }
    mouse.x =  (e.clientX / innerWidth)  * 2 - 1;
    mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  });

  window.addEventListener('touchstart', e => {
    isDragging = true;
    prevX = e.touches[0].clientX; prevY = e.touches[0].clientY;
    velX = 0; velY = 0;
  });
  window.addEventListener('touchend', () => { isDragging = false; });
  window.addEventListener('touchmove', e => {
    if(isDragging){
      velY = (e.touches[0].clientX - prevX) * 0.004;
      velX = (e.touches[0].clientY - prevY) * 0.004;
      prevX = e.touches[0].clientX; prevY = e.touches[0].clientY;
    }
  });

  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    composer.setSize(innerWidth, innerHeight);
  });

  function updateHover(){
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObject(hitMesh);
    let localHit = null;
    if(hits.length) localHit = globeGroup.worldToLocal(tempV.copy(hits[0].point));
    let dirty = false;
    for(let i = 0; i < COUNT; i++){
      let target = baseSizes[i];
      if(localHit){
        const dx = positions[i*3]   - localHit.x;
        const dy = positions[i*3+1] - localHit.y;
        const dz = positions[i*3+2] - localHit.z;
        const d  = Math.sqrt(dx*dx + dy*dy + dz*dz);
        if(d < HOVER_R){
          const t = 1 - d/HOVER_R;
          const s = t*t*(3-2*t);
          target = baseSizes[i] + s*(MAX_SZ - baseSizes[i]);
        }
      }
      const cur = sizes[i];
      if(Math.abs(cur - target) > 0.0005){ sizes[i] += (target - cur)*0.12; dirty = true; }
    }
    if(dirty) geo.attributes.size.needsUpdate = true;
  }

  let lastTime = performance.now();

  function updatePins(){
    globeGroup.updateMatrixWorld(true);

    // 1. Project all pins → store screen positions
    for(let i = 0; i < pinObjects.length; i++){
      const pin = pinObjects[i];
      const { sx, sy, facing } = projectPin(pin);
      // capsule anchor point is center of capsule top edge
      // pin-wrap is translated(-50%,-100%) so the pin tip is at (sx, sy)
      // capsule centre ≈ sy - 14px (pin-line) - half capsule height ~14px = sy-28
      screenPos[i].x   = sx;
      screenPos[i].y   = sy - 26;   // approximate capsule centre
      screenPos[i].vis = facing;
      pin.el.style.left = sx + 'px';
      pin.el.style.top  = sy + 'px';
      if(facing) pin.el.classList.remove('behind');
      else        pin.el.classList.add('behind');
    }

    // 2. Draw arcs + advance signals
    const now  = performance.now();
    const dt   = now - lastTime;
    lastTime   = now;

    for(const conn of connEls){
      const a = screenPos[conn.ai];
      const b = screenPos[conn.bi];
      const bothVis = a.vis && b.vis;

      if(bothVis){
        const mx = (a.x + b.x) * 0.5;
        const my = (a.y + b.y) * 0.5;
        const dx = b.x - a.x, dy = b.y - a.y;
        const len = Math.sqrt(dx*dx + dy*dy);

        // Control point: always pulled UPWARD on screen (negative Y)
        // Height scales with distance — longer lines arc higher
        const arcH = Math.max(40, len * 0.38);
        const cx = mx;
        const cy = my - arcH;   // pure upward lift, screen space

        // Static arc path
        conn.ln.setAttribute('d', `M${a.x},${a.y} Q${cx},${cy} ${b.x},${b.y}`);
        conn.ln.setAttribute('stroke-opacity','1');

        // Advance t
        conn.lastT = conn.t;
        conn.t = (conn.t + conn.speed * dt) % 1;
        const t = conn.t;
        const u = 1 - t;

        // Quadratic bezier position
        const px = u*u*a.x + 2*u*t*cx + t*t*b.x;
        const py = u*u*a.y + 2*u*t*cy + t*t*b.y;

        // Move all glow layers to same position
        [conn.halo, conn.mid, conn.dot].forEach(el => {
          el.setAttribute('cx', px);
          el.setAttribute('cy', py);
          el.setAttribute('opacity','1');
        });

        // Landing ring: triggers when t wraps past 0
        const justLanded = conn.t < conn.lastT;
        if(justLanded){
          conn.flash.setAttribute('cx', b.x);
          conn.flash.setAttribute('cy', b.y);
          conn.flashT = 0;
        }
        if(conn.flashT < 1){
          conn.flashT += dt * 0.003;
          const ft = Math.min(1, conn.flashT);
          const ease = ft < 0.5 ? 2*ft*ft : 1-Math.pow(-2*ft+2,2)/2;
          const fa = (1 - ease) * 0.65;
          const fr = 3 + ease * 14;
          conn.flash.setAttribute('r', fr);
          conn.flash.setAttribute('stroke', `rgba(229,170,112,${fa})`);
        } else {
          conn.flash.setAttribute('stroke','rgba(229,170,112,0)');
        }

      } else {
        conn.ln.setAttribute('stroke-opacity','0');
        [conn.halo, conn.mid, conn.dot].forEach(el => el.setAttribute('opacity','0'));
        conn.flash.setAttribute('stroke','rgba(229,170,112,0)');
      }
    }
  }

  function animate(){
    requestAnimationFrame(animate);
    globeGroup.rotation.y += velY;
    globeGroup.rotation.x += velX;
    velX *= 0.82; velY *= 0.82;
    if(!isDragging && Math.abs(velY) < 0.0002 && Math.abs(velX) < 0.0002)
      globeGroup.rotation.y += 0.0004;
    updateHover();
    updatePins();
    composer.render();
  }

  animate();
}

boot().catch(console.error);
</script>
</body>
</html>
